name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 20
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DATABASE_URL: postgresql://app:test-password@127.0.0.1:5432/app_test
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      DJANGO_SECRET_KEY: test-only-secret-that-is-long-enough-for-checks
      SESSION_HASH_SECRET: test-session-secret
      IP_HASH_SECRET: test-ip-secret
      BOOTSTRAP_ADMIN_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: python manage.py check
      - run: python manage.py makemigrations --check --dry-run
      - run: pytest
      - name: Production deploy checks
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
          SKIP_PRODUCTION_ENV_VALIDATION: "true"
          DEBUG: "false"
          SECURE_SSL_REDIRECT: "true"
        run: python manage.py check --deploy

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: hapusbackground:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Container application check
        run: docker run --rm -e DJANGO_SETTINGS_MODULE=config.settings.test hapusbackground:ci python manage.py check
