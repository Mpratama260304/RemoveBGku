services:
  - type: web
    name: hapusbackground-web
    runtime: docker
    dockerCommand: ./scripts/start.sh web
    healthCheckPath: /health/ready/
    envVars: &sharedEnv
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "false"
      - key: STORAGE_BACKEND
        value: s3
      - key: DATABASE_URL
        fromDatabase:
          name: hapusbackground-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: hapusbackground-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: keyvalue
          name: hapusbackground-redis
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: hapusbackground-redis
          property: connectionString
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: SESSION_HASH_SECRET
        sync: false
      - key: IP_HASH_SECRET
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_REGION_NAME
        sync: false
      - key: BOOTSTRAP_ADMIN_ENABLED
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_FULL_NAME
        sync: false
  - type: worker
    name: hapusbackground-worker
    runtime: docker
    dockerCommand: ./scripts/start.sh worker
    envVars: *sharedEnv
  - type: cron
    name: hapusbackground-cleanup
    runtime: docker
    schedule: "0 * * * *"
    dockerCommand: ./scripts/start.sh cleanup
    envVars: *sharedEnv
  - type: keyvalue
    name: hapusbackground-redis
    ipAllowList: []

databases:
  - name: hapusbackground-db
    databaseName: hapusbackground
    user: hapusbackground
